server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/stacktick-tools;
    index index.html;

    access_log /var/log/nginx/stacktick-tools.access.log;
    error_log /var/log/nginx/stacktick-tools.error.log warn;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        access_log off;
    }

    location = /sitemap.xml {
        access_log off;
    }
}
